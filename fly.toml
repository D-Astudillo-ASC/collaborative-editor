# fly.toml app configuration file generated for collaborative-editor-api on 2026-01-12T21:49:18-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'collaborative-editor-api'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile.backend'

[deploy]
  strategy = 'rolling'

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep at least 1 machine running — scale-to-zero tears down active
  # WebSocket connections, breaking live collaboration sessions.
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '5s'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
