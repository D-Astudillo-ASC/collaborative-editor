version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: collaborative-editor-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: collaborative_editor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://backend:5000
      - REACT_APP_SOCKET_URL=http://backend:5000
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - JWT_SECRET=your_jwt_secret_here
      - FRONTEND_URL=http://localhost:3000
      - OPENAI_API_KEY=your_openai_api_key_here
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/collaborative_editor?sslmode=disable
      - PGSSLMODE=disable
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: